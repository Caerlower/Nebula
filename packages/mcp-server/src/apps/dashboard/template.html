<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nebula Dashboard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a14;
        --card: rgba(255, 255, 255, 0.05);
        --border: rgba(255, 255, 255, 0.08);
        --text: #f4f4f8;
        --muted: rgba(255, 255, 255, 0.55);
        --violet: #7c6bf0;
        --teal: #2dd4bf;
        --warn: #fbbf24;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: radial-gradient(circle at 20% 0%, rgba(124, 107, 240, 0.12), transparent 45%),
          radial-gradient(circle at 100% 100%, rgba(45, 212, 191, 0.08), transparent 40%),
          var(--bg);
        color: var(--text);
        padding: 14px;
        font-size: 13px;
        line-height: 1.45;
      }
      .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
      .brand { display: flex; align-items: center; gap: 8px; font-weight: 600; letter-spacing: -0.02em; }
      .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #fff, var(--violet) 70%);
        box-shadow: 0 0 10px var(--violet);
      }
      .pill {
        font-size: 11px; padding: 4px 10px; border-radius: 999px;
        border: 1px solid var(--border); color: var(--muted); text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px 14px;
        margin-bottom: 10px;
        backdrop-filter: blur(12px);
      }
      .hero { background: linear-gradient(135deg, rgba(124,107,240,0.12), rgba(59,130,246,0.08)); }
      .label {
        margin: 0 0 8px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--teal);
      }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
      .tiny { font-size: 10px; margin-top: 8px; color: var(--muted); }
      .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .status { margin: 8px 0 0; font-size: 12px; }
      .status.ok { color: var(--teal); }
      .status.warn, .warn { color: var(--warn); }
      .grid.two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      .grid.three { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .row, .stat {
        display: flex; justify-content: space-between; gap: 8px;
        padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
      }
      .row:last-child { border-bottom: none; }
      .stat { flex-direction: column; border: none; padding: 0; }
      .stat span { color: var(--muted); font-size: 11px; }
      .accent { color: var(--violet); }
      .muted { color: var(--muted); }
      .center { text-align: center; padding: 24px 8px; }
      .value { margin: 0; font-size: 15px; font-weight: 600; }
      .link {
        display: inline-block;
        margin: 6px 0 4px;
        color: var(--teal);
        font-size: 11px;
        text-decoration: none;
      }
      .link:hover { text-decoration: underline; }
      @media (max-width: 520px) {
        .grid.two, .grid.three { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div id="root"><p class="muted center">Loading wallet dashboard…</p></div>
    <!--NEBULA_DASHBOARD_SCRIPT-->
  </body>
</html>
